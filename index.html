<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* 1. THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #0d0722 0%, #2b1154 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/stars_background.png') no-repeat center center;
            background-size: cover;
            z-index: 0; 
        }

        /* 2. QUẢN LÝ THỨ TỰ LỚP (Z-INDEX) THEO YÊU CẦU */

        /* Mây phải - Lớp 10 (Dưới cùng của cụm trang trí) */
        .cloud-right {
            position: absolute;
            bottom: -50px;
            right: -100px;
            width: 60vw;
            min-width: 500px;
            opacity: 0.8;
            transform: scaleX(-1); 
            z-index: 10;
            pointer-events: none;
        }

        /* Piano - Lớp 11 (Đè lên mây phải) */
        .piano {
            position: absolute;
            bottom: 60px;
            right: 80px;
            width: 250px;
            z-index: 11;
            filter: drop-shadow(0 0 20px #d8b4fe); /* Glow tím pastel */
            pointer-events: none;
        }

        /* Tờ giấy - Lớp 20 (Đè lên piano và mây phải) */
        .paper-wrapper {
            position: relative;
            width: 580px;
            height: 750px;
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 95px 60px 120px 60px;
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
        }

        /* Vạc ma thuật - Lớp 25 (Đè lên giấy nhưng dưới mây trái) */
        .cauldron {
            position: absolute;
            bottom: 80px;
            left: 50px;
            width: 180px;
            z-index: 25;
            filter: drop-shadow(0 0 20px #d8b4fe); /* Glow tím pastel */
            pointer-events: none;
        }

        /* Mây trái - Lớp 30 (Đè lên vạc và một góc giấy) */
        .cloud-left {
            position: absolute;
            bottom: -50px;
            left: -100px;
            width: 65vw;
            min-width: 550px;
            opacity: 0.8;
            z-index: 30;
            pointer-events: none;
        }

        /* 3. CĂN CHỈNH NỘI DUNG VĂN BẢN */
        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 30px;
            right: 45px;
            width: 80px;
            height: 80px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 20px;
            margin-right: 10px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 19px;
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 10px;
            line-height: 45px; /* Căn chỉnh theo dòng kẻ của bà */
        }

        /* PHÙ THỦY VÀ NÚT BẤM */
        .submit-section {
            position: absolute;
            bottom: 45px;
            right: 50px;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        .submit-btn {
            background-color: #f7e0b5;
            border: 2px solid #3b2818;
            color: #3b2818;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 3px 3px 0px #3b2818;
        }

        .witch-character {
            width: 80px;
            margin-left: -10px;
            transition: transform 0.3s ease;
        }

        /* HIỆU ỨNG CẢNH 2 */
        #scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease-in-out;
        }

        .galaxy-spiral {
            position: absolute;
            width: 2500px;
            height: 2500px;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
        }

        .flying-envelope {
            position: absolute;
            width: 70px;
            opacity: 0;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { transform: scale(1.5) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) rotate(720deg); opacity: 0; }
        }

        .envelope-fly-animation {
            animation: flyIntoGalaxy 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }

        /* ĐIỀU CHỈNH MOBILE */
        @media screen and (max-width: 768px) {
            .paper-wrapper { width: 90vw; height: 75vh; padding: 60px 30px; }
            .cloud-left, .cloud-right { width: 100vw; }
            .cauldron, .piano { transform: scale(0.7); bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="scene-1">
        <div class="stars-layer"></div>
        
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bà ơi điền nốt tên với lời chúc rồi mới gửi được nha! ✨");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bà. 🌌");
                    location.reload(); 
                }, 3500);
            }, 600);
        }
    </script>
</body>
</html>
