<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #150824 0%, #4a2574 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/stars_background.png') center/cover;
            mix-blend-mode: screen; 
            z-index: 0; 
            opacity: 0.8;
        }

        /* 1. MÂY PHẢI (LỚP 10 - Nằm dưới cùng) - ĐÃ KÉO SÁT ĐÁY */
        .cloud-right {
            position: absolute;
            bottom: -125px; /* Ép sát rịt xuống đáy màn hình */
            right: -50px;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            transform: scaleX(-1); 
            z-index: 10;
            pointer-events: none;
        }

        /* 2. PIANO (LỚP 15 - Nằm trên mây phải) - Đã hạ thấp */
        .piano {
            position: absolute;
            bottom: 20px; /* Hạ thấp tọa độ để dính mây */
            right: 50px;
            width: 350px;
            z-index: 15;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(10deg);
        }

        /* 3. TỜ GIẤY CỔ (LỚP 20) */
        .paper-wrapper {
            position: relative;
            width: 500px; 
            height: 680px; /* Tăng chiều cao để nội dung thoải mái */
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 115px 50px 120px 50px; /* Tăng padding dưới */
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 80px; 
            right: 45px;
            width: 90px;
            height: 90px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            transform: rotate(8deg);
        }

        /* CĂN CHỈNH VĂN BẢN VÀ DÒNG KẺ */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 19px;
            margin-right: 8px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px; 
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2.5px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 40px; 
            line-height: 48px; 
        }

        /* NÚT BẤM VÀ PHÙ THỦY (KHÓA CHẶT BÊN TRONG TỜ GIẤY - LỌT THỎM) */
        .submit-section {
            position: absolute;
            /* Đã tăng khoảng cách lề đáy và lề phải lên gấp đôi */
            bottom: 70px; /* Cách đáy 70px - Bao lọt */
            right: 5px;  /* Cách lề phải 80px - Bao lọt */
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        /* Cập nhật UI nút bấm sử dụng border.png làm hình nền */
        .submit-btn {
            background: url('assets/border.png') no-repeat center center;
            background-size: 100% 100%;
            border: none;
            box-shadow: none;
            color: #1a1a1a;
            /* Đẩy nội dung văn bản tránh họa tiết đồ họa ở cạnh phải */
            padding: 12px 55px 12px 15px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .witch-character {
            width: 95px;
            margin-left: -23px;
            transition: transform 1s ease;
        }

        /* 4. VẠC MA THUẬT (LỚP 25 - Nằm trên giấy, dưới mây trái) - Đã hạ thấp */
        .cauldron {
            position: absolute;
            bottom: 10px; /* Hạ thấp tọa độ để dính mây */
            left: 55px;
            width: 300px;
            z-index: 25;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(-8deg);
        }

        /* 5. MÂY TRÁI (LỚP 30 - Nằm trên cùng, đè lên vạc) - ĐÃ KÉO SÁT ĐÁY */
        .cloud-left {
            position: absolute;
            bottom: -125px; /* Ép sát rịt xuống đáy màn hình */
            left: -50px;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            z-index: 30;
            pointer-events: none;
        }

        /* HIỆU ỨNG CẢNH 2 */
       #scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
            z-index: 5;
        }
        
        .galaxy-spiral {
           position: absolute;
            width: 170vw;
            height: 170vw;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
            /* Tối ưu hóa hiển thị Pixel-art chống mờ nhòe */
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

         .flying-envelope {
            position: absolute;
            width: 60px;
            z-index: 6;
            opacity: 0;
        }
        
        .envelope-fly-animation {
            animation: flyIntoGalaxy 5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        /* ĐỊNH NGHĨA KEYFRAMES (ẢNH ĐỘNG) */
        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% {
                transform: rotate(0deg) translateX(300px) rotate(0deg) scale(1.5);
                opacity: 1;
            }
            100% {
                transform: rotate(720deg) translateX(0px) rotate(-720deg) scale(0);
                opacity: 0;
            }
        }

        /* Lớp hỗ trợ ẩn phần tử */
        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        /* ĐẢM BẢO TỶ LỆ TRÊN ĐIỆN THOẠI KHÔNG BỊ VỠ */
        @media screen and (max-width: 768px) {
            #scene-1 { transform: scale(0.8); }
            .cauldron { left: 2vw; }
            .piano { right: 2vw; }
        }
        @media screen and (max-width: 480px) {
            #scene-1 { transform: scale(0.65); }
        }
    </style>
</head>
<body>

    <div id="scene-1">
        <div class="stars-layer"></div>
        
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <!-- Nút Submit đã được tích hợp background border.png -->
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bạn vui lòng điền đầy đủ tên và lời nhắn nhé! ✨");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bạn. 🌌");
                    location.reload(); 
                }, 3500);
            }, 600);
        }
    </script>
</body>
</html>
