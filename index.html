<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #150824 0%, #4a2574 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            color: #ffffff;
        }

        /* LỚP NỀN SAO ĐỒNG BỘ HIỆU ỨNG FADE-OUT */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('assets/stars_background.png') center/cover;
            mix-blend-mode: screen; 
            -webkit-mix-blend-mode: screen;
            z-index: 0; 
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 1s ease-in-out; /* Hỗ trợ hiệu ứng mờ dần */
        }

        /* KHUNG CẢNH 1 */
        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
            transition: opacity 1s ease-in-out;
        }

        /* 1. MÂY PHẢI (LỚP 10) - Ép sát đáy */
        .cloud-right {
            position: absolute;
            bottom: -15vh; /* Khóa chặt dưới viền */
            right: -5vw;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            transform: scaleX(-1); 
            z-index: 10;
            pointer-events: none;
        }

        /* 2. PIANO (LỚP 15) */
        .piano {
            position: absolute;
            bottom: 20px; 
            right: 50px;
            width: 350px;
            z-index: 15;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(-5deg); 
        }

        /* 3. TỜ GIẤY CỔ (LỚP 20) - CĂN GIỮA TUYỆT ĐỐI */
        .paper-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Căn giữa hoàn hảo, chống lỗi zoom */
            width: 500px; 
            height: 680px; 
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 115px 50px 120px 50px; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        /* CỤM SAO TRÊN GIẤY */
        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 60px; 
            right: 45px;
            width: 70px;
            height: 70px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            transform: rotate(15deg);
        }

        /* CĂN CHỈNH VĂN BẢN */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 19px;
            margin-right: 8px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px; 
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2.5px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 30px; 
            line-height: 40px; 
        }

        /* NÚT BẤM VÀ PHÙ THỦY */
        .submit-section {
            position: absolute;
            bottom: 70px; 
            right: 7px;  
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        /* NÚT BẤM: TỰ ĐỘNG MỞ RỘNG ÔM CHỮ */
        .submit-btn {
            background: url('assets/border.png') no-repeat center center;
            background-size: 100% 100%; 
            border: none; 
            box-shadow: none; 
            color: #1a1a1a;
            padding: 15px 60px 15px 20px; /* Nới rộng lề phải cho mèo */
            font-weight: bold;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap; /* Chống rớt chữ xuống dòng */
            width: auto; /* Tự động co giãn theo nội dung */
            min-width: 150px;
        }

        .witch-character {
            width: 75px;
            margin-left: -15px;
            transition: transform 1s ease;
        }

        /* 4. VẠC MA THUẬT (LỚP 25) */
        .cauldron {
            position: absolute;
            bottom: 10px; 
            left: 55px;
            width: 300px;
            z-index: 25;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(-8deg); 
        }

        /* 5. MÂY TRÁI (LỚP 30) - Ép sát đáy */
        .cloud-left {
            position: absolute;
            bottom: -15vh; /* Khóa chặt dưới viền */
            left: -5vw;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            z-index: 30;
            pointer-events: none;
        }

        /* HIỆU ỨNG CẢNH 2 */
        #scene-2 {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
            z-index: 100;
        }
        
        .galaxy-spiral {
            position: absolute;
            width: 100vw;
            height: 100vw;
            max-width: 900px;
            max-height: 900px;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* ĐỊNH VỊ TÂM ĐIỂM CHO LÁ THƯ */
        .flying-envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            z-index: 6;
            opacity: 0;
        }
        
        .envelope-fly-animation {
            animation: flyIntoGalaxy 3.5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { 
                transform: translate(-50%, -50%) rotate(0deg) translateX(150px) rotate(0deg) scale(1.5); 
                opacity: 1; 
            }
            100% { 
                transform: translate(-50%, -50%) rotate(720deg) translateX(0px) rotate(-720deg) scale(0); 
                opacity: 0; 
            }
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }

        /* ĐIỀU CHỈNH GIAO DIỆN MOBILE TỐI ƯU HÓA (ĐẨY TĨNH VẬT RA LỀ) */
        @media screen and (max-width: 768px) {
            /* Giữ nguyên tọa độ tuyệt đối, bổ sung biến đổi thu nhỏ */
            .paper-wrapper { transform: translate(-50%, -50%) scale(0.75); }
            .cauldron { left: -10vw; width: 220px; bottom: 10px; }
            .piano { right: -10vw; width: 240px; bottom: 20px; }
            .cloud-left { width: 100vw; left: -10vw; bottom: -5vh; }
            .cloud-right { width: 100vw; right: -10vw; bottom: -5vh; }
        }
        
        @media screen and (max-width: 480px) {
            .paper-wrapper { transform: translate(-50%, -50%) scale(0.65); }
            .cauldron { left: -15vw; width: 180px; }
            .piano { right: -15vw; width: 200px; }
        }
    </style>
</head>
<body>

    <div class="stars-layer" id="stars-layer"></div>

    <div id="scene-1">
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bạn vui lòng điền đầy đủ tên và lời nhắn nhé! ✨");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                
                // Đồng bộ hóa trạng thái mờ dần của lớp nền sao
                document.getElementById('stars-layer').style.opacity = '0';
                
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bạn. 🌌");
                    location.reload(); 
                }, 3500);
            }, 600);
        }
    </script>
</body>
</html>
