<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* 1. THIẾT LẬP CƠ SỞ VÀ NỀN GRADIENT */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Phục hồi màu Gradient gốc siêu đẹp */
            background: linear-gradient(180deg, #150824 0%, #4a2574 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* KHẮC PHỤC LỖI MẤT NỀN OMBRE: Lọc bỏ nền đen của ảnh sao */
        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/stars_background.png') center/cover;
            mix-blend-mode: screen; /* Thần chú giữ lại sao sáng, xóa nền đen */
            z-index: 0; 
            opacity: 0.8;
        }

        /* 2. QUẢN LÝ THỨ TỰ LỚP VÀ KÍCH THƯỚC (ĐÃ PHÓNG TO & KÉO SÁT ĐÁY) */

        /* Mây phải (Lớp 10) */
        .cloud-right {
            position: absolute;
            bottom: -20px; /* Ép sát đáy màn hình */
            right: -20px;
            width: 55vw;
            min-width: 500px;
            opacity: 0.9;
            transform: scaleX(-1); 
            z-index: 10;
            pointer-events: none;
        }

        /* Piano (Lớp 15 - Nằm trên mây phải) - ĐÃ PHÓNG TO */
        .piano {
            position: absolute;
            bottom: 60px; 
            right: 10vw;
            width: 280px; /* Phóng to lên */
            z-index: 15;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
        }

        /* Tờ giấy (Lớp 20 - Nằm trên piano và mây phải) */
        .paper-wrapper {
            position: relative;
            width: 500px; 
            height: 650px; 
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            /* Tăng padding dưới để có chỗ an toàn nhét nút bấm */
            padding: 85px 50px 100px 50px; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* Ngôi sao góc phải (Đã kéo lọt vào trong mép giấy) */
        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 35px; 
            right: 40px; 
            width: 60px;
            height: 60px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
        }

        /* Vạc ma thuật (Lớp 25 - Nằm trên giấy) - ĐÃ PHÓNG TO */
        .cauldron {
            position: absolute;
            bottom: 60px; 
            left: 10vw;
            width: 200px; /* Phóng to lên */
            z-index: 25;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
        }

        /* Mây trái (Lớp 30 - Nằm trên cùng, đè lên vạc) */
        .cloud-left {
            position: absolute;
            bottom: -20px; /* Ép sát đáy màn hình */
            left: -20px;
            width: 55vw;
            min-width: 500px;
            opacity: 0.9;
            z-index: 30;
            pointer-events: none;
        }

        /* 3. CĂN CHỈNH VĂN BẢN VÀ DÒNG KẺ (KÉO CHỮ LÊN) */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 19px;
            margin-right: 8px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px; 
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 1.5px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            /* Xóa margin-top để dòng chữ đầu tiên không bị tuột xuống */
            margin-top: -2px; 
            line-height: 48px; 
        }

        /* NÚT BẤM VÀ PHÙ THỦY (KHÓA CHẶT BÊN TRONG TỜ GIẤY) */
        .submit-section {
            position: absolute;
            bottom: 25px; /* Nằm gọn trong khoảng padding 100px của tờ giấy */
            right: 30px;  
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        .submit-btn {
            background-color: #f7e0b5;
            border: 2px solid #3b2818;
            color: #3b2818;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #3b2818;
        }

        .witch-character {
            width: 75px;
            margin-left: -5px;
            transition: transform 0.3s ease;
        }

        /* HIỆU ỨNG CẢNH 2 */
        #scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease-in-out;
        }

        .galaxy-spiral {
            position: absolute;
            width: 2500px;
            height: 2500px;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
        }

        .flying-envelope {
            position: absolute;
            width: 60px;
            opacity: 0;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { transform: scale(1.5) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) rotate(720deg); opacity: 0; }
        }

        .envelope-fly-animation {
            animation: flyIntoGalaxy 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }

        /* ĐẢM BẢO TỶ LỆ TRÊN ĐIỆN THOẠI KHÔNG BỊ VỠ */
        @media screen and (max-width: 768px) {
            #scene-1 { transform: scale(0.85); }
            .cauldron { left: 2vw; bottom: 80px; }
            .piano { right: 2vw; bottom: 80px; }
        }
        @media screen and (max-width: 480px) {
            #scene-1 { transform: scale(0.65); }
        }
    </style>
</head>
<body>

    <div id="scene-1">
        <div class="stars-layer"></div>
        
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bạn vui lòng điền đầy đủ tên và lời nhắn nhé!");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bạn. 🌌");
                    location.reload(); 
                }, 3500);
            }, 600);
        }
    </script>
</body>
</html>
