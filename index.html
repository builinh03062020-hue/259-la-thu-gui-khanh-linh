<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #150824 0%, #4a2574 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* KHUNG CẢNH 1: KÍCH THƯỚC CỐ ĐỊNH CHO RESPONSIVE ĐỒNG DẠNG */
        #scene-1 {
            position: relative;
            width: 1000px;
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: transform 0.2s ease-out;
            transform-origin: center;
        }

        /* LỚP NỀN SAO ĐƯỢC TỐI ƯU HÓA TRÊN MOBILE */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('assets/stars_background.png') center/cover;
            mix-blend-mode: screen; 
            -webkit-mix-blend-mode: screen;
            z-index: 0; 
            opacity: 0.8;
            pointer-events: none;
        }

        /* 1. MÂY PHẢI (LỚP 10) */
        .cloud-right {
            position: absolute;
            bottom: -125px; 
            right: -50px;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            transform: scaleX(-1); 
            z-index: 10;
            pointer-events: none;
        }

        /* 2. PIANO (LỚP 15) */
        .piano {
            position: absolute;
            bottom: 20px; 
            right: 50px;
            width: 350px;
            z-index: 15;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(-5deg); 
        }

        /* 3. TỜ GIẤY CỔ (LỚP 20) */
        .paper-wrapper {
            position: relative;
            width: 500px; 
            height: 680px; 
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 115px 50px 120px 50px; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* CỤM SAO TRÊN GIẤY */
        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 60px; 
            right: 45px;
            width: 70px;
            height: 70px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            transform: rotate(15deg); 
        }

        /* CĂN CHỈNH VĂN BẢN VÀ DÒNG KẺ */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 19px;
            margin-right: 8px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px; 
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2.5px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 30px; 
            line-height: 40px; 
        }

        /* NÚT BẤM VÀ PHÙ THỦY */
        .submit-section {
            position: absolute;
            bottom: 70px; 
            right: 7px;  
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        /* TÁI THIẾT KẾ KHUNG NÚT BẤM VỚI ẢNH NỀN */
        .submit-btn {
            background: url('assets/border.png') no-repeat center center;
            background-size: 100% 100%; 
            border: none; 
            box-shadow: none; 
            color: #1a1a1a;
            padding: 12px 45px 12px 15px; 
            font-weight: bold;
            font-size: 17px;
            display: flex;
            align-items: center;
        }

        .witch-character {
            width: 75px;
            margin-left: -5px;
            transition: transform 1s ease;
        }

        /* 4. VẠC MA THUẬT (LỚP 25) */
        .cauldron {
            position: absolute;
            bottom: 10px; 
            left: 55px;
            width: 300px;
            z-index: 25;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            pointer-events: none;
            transform: rotate(-8deg); 
        }

        /* 5. MÂY TRÁI (LỚP 30) */
        .cloud-left {
            position: absolute;
            bottom: -125px; 
            left: -50px;
            width: 55vw;
            min-width: 450px;
            opacity: 0.8;
            z-index: 30;
            pointer-events: none;
        }

        /* HIỆU ỨNG CẢNH 2 */
        #scene-2 {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
            z-index: 100;
        }
        
        .galaxy-spiral {
            position: absolute;
            width: 100vw;          /* Đã giảm kích thước */
            height: 100vw;         /* Đã giảm kích thước */
            max-width: 900px;      /* Cố định giới hạn tối đa */
            max-height: 900px;     /* Cố định giới hạn tối đa */
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
            
            /* TỐI ƯU HÓA HIỂN THỊ PIXEL-ART */
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .flying-envelope {
            position: absolute;
            width: 60px;
            z-index: 6;
            opacity: 0;
        }
        
        .envelope-fly-animation {
            animation: flyIntoGalaxy 3.5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        /* ĐỊNH NGHĨA KEYFRAMES */
        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% {
                transform: rotate(0deg) translateX(300px) rotate(0deg) scale(1.5);
                opacity: 1;
            }
            100% {
                transform: rotate(720deg) translateX(0px) rotate(-720deg) scale(0);
                opacity: 0;
            }
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        /* CƠ CHẾ RESPONSIVE TỰ ĐỘNG */
        @media (max-width: 1000px), (max-height: 800px) {
            #scene-1 {
                transform: scale(min(calc(100vw / 1000), calc(100vh / 800)));
            }
        }
    </style>
</head>
<body>

    <div class="stars-layer"></div>

    <div id="scene-1">
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bạn vui lòng điền đầy đủ tên và lời nhắn nhé! ✨");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bạn. 🌌");
                    location.reload(); 
                }, 3500);
            }, 600);
        }
    </script>
</body>
</html>
