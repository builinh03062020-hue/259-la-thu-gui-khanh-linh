<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #0d0722 0%, #2b1154 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* KHU VỰC CẢNH 1: GIAO DIỆN CHÍNH */
        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
            z-index: 10;
        }

        /* Lớp nền Ngân hà tĩnh */
        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/stars_background.png') no-repeat center center;
            background-size: cover;
            z-index: 0; 
        }

        /* QUẢN LÝ BỐ CỤC ĐÁY MÀN HÌNH (CỐ ĐỊNH PIXEL TỐI ĐA) */
        .scenery-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px; 
            z-index: 1; 
            pointer-events: none;
            overflow: hidden;
        }

        .cloud-left {
            position: absolute;
            bottom: -30px;
            left: -50px;
            width: 600px; /* Kích thước cố định tuyệt đối */
            height: auto;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.4));
        }

        .cloud-right {
            position: absolute;
            bottom: -30px;
            right: -50px;
            width: 600px; /* Kích thước cố định tuyệt đối */
            height: auto;
            opacity: 0.8;
            transform: scaleX(-1); 
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.4));
        }

        .cauldron {
            position: absolute;
            bottom: 30px;
            left: 100px; /* Tọa độ cố định tuyệt đối */
            width: 160px;
        }

        .cauldron::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.6) 0%, transparent 70%);
            filter: blur(5px);
            opacity: 0.8;
            animation: steamRise 2s ease-out infinite;
        }

        .piano {
            position: absolute;
            bottom: 30px;
            right: 100px; /* Tọa độ cố định tuyệt đối */
            width: 200px;
        }

        .piano::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: 120%;
            background: url('assets/piano_smoke_effect.png') no-repeat center center; 
            background-size: contain;
            opacity: 0.9;
        }

        /* TỜ GIẤY CỔ (CỐ ĐỊNH KÍCH THƯỚC TRÁNH BIẾN DẠNG) */
        .paper-wrapper {
            position: relative;
            width: 500px;  /* Không sử dụng % */
            height: 600px; /* Không sử dụng vh */
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 85px 60px 100px 60px; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
        }

        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 25px;
            right: 35px;
            width: 70px;
            height: 70px;
            background: url('assets/paper_stars.png') no-repeat center center; 
            background-size: contain;
            pointer-events: none;
        }

        /* CĂN CHỈNH DÒNG CHỮ (PIXEL-PERFECT VỚI LINE-HEIGHT) */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 18px;
            margin-right: 10px;
            white-space: nowrap;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px;
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2px dashed #8b6b4a;
            padding-bottom: 5px;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 15px; 
            line-height: 40px; /* Khóa chặt khoảng cách dòng */
            background-image: linear-gradient(transparent, transparent 38px, #8b6b4a 38px, #8b6b4a 40px);
            background-size: 100% 40px;
        }

        /* NÚT BẤM VÀ NHÂN VẬT BỌC LỌT TRONG TỜ GIẤY */
        .submit-section {
            position: absolute;
            bottom: 25px; 
            right: 25px; 
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 30; 
        }

        .submit-btn {
            background-color: #f7e0b5;
            border: 2px solid #3b2818;
            color: #3b2818;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #3b2818;
            white-space: nowrap;
        }

        .witch-character {
            width: 70px;
            margin-left: -5px;
        }

        /* KHU VỰC CẢNH 2: VÒNG XOÁY NGÂN HÀ */
        #scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
            z-index: 50;
        }

        .galaxy-spiral {
            position: absolute;
            width: 2000px;
            height: 2000px;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
        }

        .flying-envelope {
            position: absolute;
            width: 60px;
            z-index: 55;
            opacity: 0;
        }

        /* ĐỊNH NGHĨA KEYFRAMES */
        @keyframes steamRise {
            0% { transform: translateX(-50%) translateY(0); opacity: 0; }
            50% { transform: translateX(-50%) translateY(-20px); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-40px); opacity: 0; }
        }

        @keyframes witchTap {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(-30deg) translateY(-15px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        .witch-tap-animation {
            animation: witchTap 0.6s ease-in-out;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { transform: scale(1.5) rotate(0deg); opacity: 1; }
            50% { transform: scale(1) rotate(360deg); opacity: 1; }
            100% { transform: scale(0) rotate(720deg); opacity: 0; }
        }

        .envelope-fly-animation {
            animation: flyIntoGalaxy 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <div id="scene-1">
        <div class="stars-layer"></div>
        
        <div class="scenery-container">
            <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
            <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
            
            <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
            <img src="assets/piano.png" class="piano" alt="Đàn piano ma thuật">
        </div>

        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Phù thủy dẫn đường">
            </div>
        </div>
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope" alt="Lá thư ma thuật">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const senderValue = document.getElementById('sender').value.trim();
            const messageValue = document.getElementById('message').value.trim();

            if (senderValue === "" || messageValue === "") {
                alert("Vui lòng điền đầy đủ tên của bạn và lời nhắn trước khi gửi đến những vì sao nhé!");
                return; 
            }

            const scene1 = document.getElementById('scene-1');
            const scene2 = document.getElementById('scene-2');
            const witch = document.getElementById('witch');
            const envelope = document.getElementById('flying-envelope');
            const audio = document.getElementById('twinkle-audio');

            witch.classList.add('witch-tap-animation');

            setTimeout(() => {
                scene1.classList.add('hidden');
                scene2.style.opacity = '1';
                scene2.style.pointerEvents = 'auto';

                setTimeout(() => {
                    envelope.classList.add('envelope-fly-animation');
                }, 300);

                setTimeout(() => {
                    let playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.log("Audio playback prevented by browser policy.");
                        });
                    }
                    
                    // XỬ LÝ ĐIỀU HƯỚNG TẠM THỜI (THAY THẾ CHUYỂN TRANG BẰNG THÔNG BÁO)
                    setTimeout(() => {
                        alert("Gửi thành công! Lá thư của bạn đã hòa vào dải ngân hà. (Trang hiển thị 259 lá thư đang được xây dựng)");
                        // Phục hồi lại giao diện sau khi ấn OK (Tùy chọn)
                        location.reload(); 
                    }, 1500);

                }, 3000); 

            }, 600); 
        }
    </script>
</body>
</html>
