<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* 1. THIẾT LẬP CƠ SỞ VÀ NỀN GRADIENT */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #150824 0%, #4a2574 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* 2. CƠ CHẾ RESPONSIVE TỰ ĐỘNG (DYNAMIC SCALE) */
        #scene-1 {
            position: relative;
            width: 1000px; /* Kích thước thiết kế chuẩn */
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: transform 0.2s ease-out;
            transform-origin: center;
        }

        /* Thần chú tự động co giãn theo màn hình */
        @media (max-width: 1000px) or (max-height: 800px) {
            #scene-1 {
                transform: scale(min(calc(100vw / 1000), calc(100vh / 800)));
            }
        }

        /* Nền sao blend màu */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('assets/stars_background.png') center/cover;
            mix-blend-mode: screen; 
            z-index: 0; 
            opacity: 0.8;
            pointer-events: none;
        }

        /* 3. QUẢN LÝ TỌA ĐỘ TĨNH VẬT (THEO THÔNG SỐ CỦA BẠN) */

        .cloud-right {
            position: absolute;
            bottom: -125px; 
            right: -50px;
            width: 550px;
            opacity: 0.8;
            transform: scaleX(-1); 
            z-index: 10;
        }

        .piano {
            position: absolute;
            bottom: 20px; 
            right: 50px;
            width: 350px;
            z-index: 15;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            transform: rotate(10deg)
        }

        .paper-wrapper {
            position: relative;
            width: 500px; 
            height: 680px; 
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 115px 50px 120px 50px; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .paper-wrapper::after {
            content: '';
            position: absolute;
            top: 60px; 
            right: 45px;
            width: 70px;
            height: 70px;
            background: url('assets/paper_stars.png') no-repeat center center;
            background-size: contain;
            transform: rotate(8deg)
        }

        .cauldron {
            position: absolute;
            bottom: 10px; 
            left: 55px;
            width: 300px;
            z-index: 25;
            filter: drop-shadow(0 0 25px #d8b4fe); 
            transform: rotate(-8deg)
        }

        .cloud-left {
            position: absolute;
            bottom: -125px; 
            left: -50px;
            width: 550px;
            opacity: 0.8;
            z-index: 30;
        }

        /* 4. ĐỊNH DẠNG VĂN BẢN */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: 19px;
            margin-right: 8px;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 18px; 
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2.5px dashed #8b6b4a;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            margin-top: 30px; 
            line-height: 40px; 
        }

        .submit-section {
            position: absolute;
            bottom: 70px; 
            right: 7px;  
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 40;
        }

        .submit-btn {
            background-color: transparent;
            border: 2px solid #3b2818;
            color: #3b2818;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #3b2818;
        }

        .witch-character {
            width: 75px;
            margin-left: -5px;
            transition: transform 1s ease;
        }

        /* 5. CẢNH HIỆU ỨNG CHUYỂN TRANG */
        #scene-2 {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
            z-index: 100;
        }
        
        .galaxy-spiral {
            position: absolute;
            width: 170vw;
            height: 170vw;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
        }

        .flying-envelope {
            position: absolute;
            width: 60px;
            opacity: 0;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { transform: rotate(0deg) translateX(300px) rotate(0deg) scale(1.5); opacity: 1; }
            100% { transform: rotate(720deg) translateX(0px) rotate(-720deg) scale(0); opacity: 0; }
        }

        .envelope-fly-animation {
            animation: flyIntoGalaxy 3.5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div class="stars-layer"></div>

    <div id="scene-1">
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Piano">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn gửi đến những vì sao..."></textarea>
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Witch">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        function processSubmission() {
            const sender = document.getElementById('sender').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!sender || !message) {
                alert("Bạn vui lòng điền đầy đủ tên và lời nhắn nhé! ✨");
                return; 
            }

            const witch = document.getElementById('witch');
            witch.style.transform = "rotate(-30deg) translateY(-20px)";

            setTimeout(() => {
                witch.style.transform = "rotate(0deg) translateY(0)";
                document.getElementById('scene-1').classList.add('hidden');
                document.getElementById('scene-2').style.opacity = '1';
                document.getElementById('scene-2').style.pointerEvents = 'auto';
                document.getElementById('flying-envelope').classList.add('envelope-fly-animation');
                
                document.getElementById('twinkle-audio').play().catch(() => {});

                setTimeout(() => {
                    alert("Gửi thành công! Những vì sao đã nhận được lời nhắn của bạn. 🌌");
                    location.reload(); 
                }, 3500);
            }, 1000);
        }
    </script>
</body>
</html>
