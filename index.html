<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thư Đến Những Vì Sao</title>
    <style>
        /* THIẾT LẬP CƠ SỞ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0722;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* KHU VỰC CẢNH 1 */
        #scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
            z-index: 10;
        }

        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/stars_background.png') no-repeat center center;
            background-size: cover;
            z-index: 0; 
        }

        /* TỐI ƯU HÓA PHÂN LỚP ĐỒ HỌA (Z-INDEX) */
        
        /* Mây phải: Dưới giấy (10 < 20) */
        .cloud-right {
            position: absolute;
            bottom: -5%;
            right: -5%;
            width: 50%;
            max-width: 600px;
            opacity: 0.8;
            z-index: 10; 
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Piano: Trên mây phải (11 > 10) */
        .piano {
            position: absolute;
            bottom: 8%;
            right: 5%;
            width: 180px;
            max-width: 25vw;
            z-index: 11; 
            pointer-events: none;
        }

        /* Cuộn giấy: Lớp trung tâm (20) */
        .paper-wrapper {
            position: relative;
            width: 95%;
            max-width: 550px;
            height: 65vh;
            min-height: 450px;
            background: url('assets/paper.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 10% 18% 15% 18%; 
            box-sizing: border-box;
            z-index: 20; 
            display: flex;
            flex-direction: column;
        }

        /* Vạc ma thuật: Dưới mây trái, lộ một phần (25 < 30) */
        .cauldron {
            position: absolute;
            bottom: 8%;
            left: 8%;
            width: 150px;
            max-width: 20vw;
            z-index: 25; 
            pointer-events: none;
        }

        /* Mây trái: Trên giấy và vạc (30 > 25, 20) */
        .cloud-left {
            position: absolute;
            bottom: -5%;
            left: -5%;
            width: 50%;
            max-width: 600px;
            opacity: 0.8;
            z-index: 30; 
            pointer-events: none;
        }

        /* ĐỊNH DẠNG BIỂU MẪU NHẬP LIỆU */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group label {
            color: #3b2818;
            font-weight: bold;
            font-size: clamp(14px, 4vw, 18px);
            margin-right: 10px;
            white-space: nowrap;
        }

        .paper-input, .paper-textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: clamp(14px, 4vw, 18px);
            color: #3b2818;
            width: 100%;
        }

        .paper-input {
            border-bottom: 2px dashed #8b6b4a;
            padding-bottom: 5px;
        }

        .paper-textarea {
            resize: none;
            flex-grow: 1;
            line-height: 35px;
            background-image: linear-gradient(transparent, transparent 33px, #8b6b4a 33px, #8b6b4a 35px);
            background-size: 100% 35px;
        }

        .submit-section {
            position: absolute;
            bottom: 5%;
            right: 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 35; /* Nút gửi phải luôn nằm trên cùng để tương tác */
        }

        .submit-btn {
            background-color: #f7e0b5;
            border: 2px solid #3b2818;
            color: #3b2818;
            padding: 10px 15px;
            font-weight: bold;
            font-size: clamp(12px, 3.5vw, 16px);
            border-radius: 8px;
            box-shadow: 2px 2px 0px #3b2818;
        }

        .witch-character {
            width: clamp(60px, 15vw, 80px);
            margin-left: -10px;
        }

        /* KHU VỰC CẢNH 2 */
        #scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
            z-index: 50;
        }

        .galaxy-spiral {
            position: absolute;
            width: 200vw;
            height: 200vw;
            max-width: 1000px;
            max-height: 1000px;
            background: url('assets/spiral.png') no-repeat center center;
            background-size: contain;
            animation: rotateSpiral 30s linear infinite;
        }

        .flying-envelope {
            position: absolute;
            width: 50px;
            z-index: 55;
            opacity: 0;
        }

        /* KHUNG HÌNH CHUYỂN ĐỘNG (KEYFRAMES) */
        @keyframes witchTap {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(-30deg) translateY(-15px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        .witch-tap-animation {
            animation: witchTap 0.6s ease-in-out;
        }

        @keyframes rotateSpiral {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flyIntoGalaxy {
            0% { transform: scale(1.5) rotate(0deg); opacity: 1; }
            50% { transform: scale(1) rotate(360deg); opacity: 1; }
            100% { transform: scale(0) rotate(720deg); opacity: 0; }
        }

        .envelope-fly-animation {
            animation: flyIntoGalaxy 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* TỐI ƯU HÓA HIỂN THỊ THIẾT BỊ DI ĐỘNG */
        @media screen and (max-width: 768px) {
            .cloud-left, .cloud-right {
                width: 80%;
                bottom: -2%;
            }
            .piano {
                width: 100px;
                right: 2%;
                bottom: 5%;
            }
            .cauldron {
                width: 90px;
                left: 2%;
                bottom: 5%;
            }
            .paper-wrapper {
                height: 70vh;
                padding: 12% 15% 20% 15%;
            }
            .submit-section {
                bottom: 2%;
                right: -5%;
            }
        }
    </style>
</head>
<body>

    <div id="scene-1">
        <div class="stars-layer"></div>
        
        <img src="assets/clouds.png" class="cloud-right" alt="Mây phải">
        <img src="assets/piano.png" class="piano" alt="Đàn piano ma thuật">
        
        <div class="paper-wrapper">
            <div class="input-group">
                <label for="sender">From:</label>
                <input type="text" id="sender" class="paper-input" placeholder="Tên của bạn...">
            </div>
            
            <textarea id="message" class="paper-textarea" placeholder="Viết lời nhắn..."></textarea>
            
            <div class="submit-section" onclick="processSubmission()">
                <div class="submit-btn">To the star holder</div>
                <img src="assets/witch.png" id="witch" class="witch-character" alt="Phù thủy dẫn đường">
            </div>
        </div>

        <img src="assets/cauldron.png" class="cauldron" alt="Vạc ma thuật">
        <img src="assets/clouds.png" class="cloud-left" alt="Mây trái">
    </div>

    <div id="scene-2">
        <div class="galaxy-spiral"></div>
        <img src="assets/letter.png" id="flying-envelope" class="flying-envelope" alt="Lá thư ma thuật">
    </div>

    <audio id="twinkle-audio" src="assets/twinkle.mp3"></audio>

    <script>
        /**
         * Xử lý xác thực dữ liệu và điều hướng hiệu ứng
         */
        function processSubmission() {
            const senderValue = document.getElementById('sender').value.trim();
            const messageValue = document.getElementById('message').value.trim();

            if (senderValue === "" || messageValue === "") {
                alert("Vui lòng điền đầy đủ tên của bạn và lời nhắn trước khi gửi đến những vì sao nhé!");
                return; 
            }

            const scene1 = document.getElementById('scene-1');
            const scene2 = document.getElementById('scene-2');
            const witch = document.getElementById('witch');
            const envelope = document.getElementById('flying-envelope');
            const audio = document.getElementById('twinkle-audio');

            witch.classList.add('witch-tap-animation');

            setTimeout(() => {
                scene1.classList.add('hidden');
                scene2.style.opacity = '1';
                scene2.style.pointerEvents = 'auto';

                setTimeout(() => {
                    envelope.classList.add('envelope-fly-animation');
                }, 300);

                setTimeout(() => {
                    let playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.log("Audio playback prevented by browser policy.");
                        });
                    }
                    
                    setTimeout(() => {
                        window.location.href = "gallery.html"; 
                    }, 1500);

                }, 3000); 

            }, 600); 
        }
    </script>
</body>
</html>
